# Shipping dxvk.conf for the THUG2 macOS lane (patched DXVK on M1/MoltenVK).
#
# ⚠️ READ THIS BEFORE TRUSTING ANY "PROVEN" CLAIM ABOUT THIS FILE.
#
# These settings were once credited with curing the macOS "menu freeze". They did not. The
# freeze was VV.HudFix and VV.GlyphFix rewriting live game code from a worker thread, which is
# unsound under Rosetta; it was fixed in the mods themselves (they now patch cold in DllMain).
# PERF.md measured enableAsync and numCompilerThreads directly and found BOTH non-causal.
#
# The values below are UNCHANGED, and they are kept on their own merits as frame-pacing and
# shader-cache tuning. But none of them fixes a hang. If the menu ever freezes again, do not come
# back to this file: go look at what is patching game code.
#
# The perf ceiling on an M1 is CPU/Rosetta-bound (median frame a perfect 16.67ms, ~9% of frames
# overrunning to 25-35ms). No graphics setting moves that. Don't rabbit-hole here.

# Compile pipelines on background threads instead of stalling the render thread the first time a
# shader is seen. Kept because it should shorten first-seen-shader hitches. NOT a freeze fix, and
# not yet independently benchmarked on this lane.
dxvk.enableAsync = True

# Compile those background shaders faster, so the async "not ready yet" window stays short. The
# M1 has spare cores while THUG2 pins one or two.
dxvk.numCompilerThreads = 6

# Frame pacing: let the CPU run 2 frames ahead of the GPU. At latency=1 a single slow
# (Rosetta-translated) frame stalls the whole pipeline every frame, which is the rhythmic skating
# stutter. 2 buffers that out, and costs ~1 frame of input lag.
d3d9.maxFrameLatency = 2
dxvk.maxFrameLatency = 2

# Persist compiled pipelines to <exe>.dxvk-cache, so a shader seen once is never recompiled on a
# later run. This is what kills "the first lap of every level stutters".
dxvk.enableStateCache = True

# THUG2's sim is locked at 60. On a 120Hz ProMotion panel DXVK would render as fast as it can
# against a 60Hz sim, which judders. Cap presentation at 60 for even frame delivery. (Harmless on
# a 60Hz panel.)
dxvk.maxFrameRate = 60
