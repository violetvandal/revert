# revert.conf — single source of truth for the Revert toolkit.
#
# Flat KEY=VALUE, POSIX-shell-sourceable (the bash dispatcher `source`s this; the Go
# build core reads it with a tiny KEY=VALUE parser — no TOML, preserving zero-dep).
# REVERT_ROOT is exported by the `revert` dispatcher before this file is sourced.
#
# Anything pointing at game data / licensed packs is USER-SUPPLIED and gitignored —
# Revert ships tooling, never game files. See docs/INSTALL.md.

# ---- paths ----
PRISTINE_DIR="${REVERT_ROOT}/game-pristine-us"
MODS_DIR="${REVERT_ROOT}/mods"
THUGKIT="${REVERT_ROOT}/tools/thugkit/thugkit"
SHARE_DIR="${REVERT_ROOT}/share"

# ---- toolchain PATH ----
# The bootstrap installer puts Go under ~/.local/go but only adds it to PATH for the
# install session (not the user's profile). Re-add it here when the system has no `go`,
# so `revert build`/`revert update` can rebuild thugkit in a fresh shell (e.g. the Steam
# Deck, where a submodule bump left the thugkit binary stale and the update failed to
# rebuild it). Shell-only line — the Go KEY=VALUE conf parser ignores it, like GE_DIR.
if ! command -v go >/dev/null 2>&1 && [ -x "${HOME}/.local/go/bin/go" ]; then
  export PATH="${HOME}/.local/go/bin:${PATH}"
fi

# ---- wine runtime (host-specific; this file is shared, so resolve per host) ----
# Steam Deck: Kron4ek wine 11.11 — wine-ge-8-26's 2023 build crashes EVERY 32-bit app
# on SteamOS's glibc 2.41 (notepad/THUG2 die in seconds). The same wall hits any
# current-glibc distro (Ubuntu 24.04 = glibc 2.39), so Kron4ek 11.11 is the safe default
# everywhere EXCEPT a dev/desktop box that already has a working wine-ge-8-26 install —
# there we keep using it (no forced re-download). A fresh box (Ubuntu test, etc.) resolves
# to the Kron4ek dir and revert-setup's check_ge auto-downloads it, same as the Deck.
# Detect the Deck via Game-Mode env (SteamDeck=1) or the DMI board name (Jupiter/Galileo).
_ge826="${HOME}/.local/share/lutris/runners/wine/wine-ge-8-26-x86_64"
if [[ "${SteamDeck:-0}" == "1" ]] || grep -qiE 'jupiter|galileo' /sys/devices/virtual/dmi/id/product_name 2>/dev/null; then
  GE_DIR="${HOME}/.local/share/lutris/runners/wine/wine-11.11-staging-amd64"
elif [[ -x "${_ge826}/bin/wine" ]]; then
  GE_DIR="${_ge826}"                                                             # existing dev/desktop install — keep it
else
  GE_DIR="${HOME}/.local/share/lutris/runners/wine/wine-11.11-staging-amd64"     # fresh box → auto-downloaded by check_ge
fi
unset _ge826
WINEARCH="win32"
PREFIX_MAIN="${HOME}/.wine-thug2-ge"        # Vanilla + QOL-Modded lanes
PREFIX_ONLINE="${HOME}/.wine-thugpro"       # THUG Pro (isolated)
DXVK_VERSION="2.7.1"

# Which GPU DXVK renders on (substring of the Vulkan deviceName, e.g. "Intel" / "AMD").
# Empty = DXVK's default (the discrete GPU). Set this on a multi-GPU box whose discrete
# card is weak or on a poor driver (nouveau/llvmpipe); `revert run --gpu <name>` overrides
# it per-launch, and `revert doctor` flags when it's worth setting. Feeds DXVK_FILTER_DEVICE_NAME.
GPU_FILTER=""

# ---- macOS lane (Wine + our patched DXVK; see tools/dxvk-mac/) ----
# Only read on macOS. The Mac runs a NATIVE Go front door (the bash dispatcher above is
# Linux-specific), so these are plain KEY=VALUE for the Go conf parser.
#
# WINE: `revert setup` DOWNLOADS Wine itself, into .revert-cache/mac/wine, and verifies it
# against the checksum below. It does NOT use Homebrew.
#
# Why: Homebrew is removing EVERY Wine cask (wine-stable, wine@devel, wine@staging) on
# 2026-09-01 -- its maintainers no longer accept software that fails Apple's Gatekeeper
# notarization check. That is a packaging-policy decision, not a Wine problem: the cask was
# only ever a thin wrapper around the tarball URL below. Fetching it ourselves means the
# deadline does not apply to us, Homebrew becomes optional, and we pin one known-good Wine
# instead of drifting. Set MAC_WINE to use your own build instead (an existing Homebrew
# /Applications/Wine Stable.app is also picked up automatically).
MAC_WINE=""
MAC_WINE_URL="https://github.com/Gcenx/macOS_Wine_builds/releases/download/11.0_1/wine-stable-11.0_1-osx64.tar.xz"
MAC_WINE_SHA256="b50dc50ec7f41d58b115a6b685d4d1315ba3c797bd3aa0f49213f2703cb82388"
PREFIX_MAC="${HOME}/.wine-thug2-ws"
# Virtual-desktop size. "auto" = the display's LOGICAL resolution (macOS "UI Looks like",
# e.g. 1440x900 on a 2560x1600 Retina panel), which matches the panel's aspect so the
# widescreen fix doesn't stretch, and avoids paying for 2x backing-scale pixels.
MAC_RESOLUTION="auto"
# The three VV .asi mods (top-left HUD / Xbox trick glyphs / controller text entry).
#
# RE-BISECTED on the M1 (2026-07-12), correcting an earlier call: the earlier bisect blamed
# GlyphFix, but it ran with HudFix loaded in every trial -- including the "baseline" ones, and
# HudFix was itself crashing/freezing the game on ~half of all launches. Both mods patched live
# game code from a Sleep(6000) worker thread (a torn write into a hot function; also W^X-illegal
# PAGE_EXECUTE_READWRITE), which is unsound under Rosetta. Both now patch COLD in DllMain, and
# GlyphFix's live keyboard<->controller toggle is disabled on macOS (VV_GLYPH_LIVE=0; the pick
# applies on the next launch, like the font theme). Verified 8/8 clean launches with all three.
#   none  |  all  |  a comma list of: hudfix, glyphfix, keyboardgrid
# Linux and Windows always build all three, whatever this says (and keep the live toggle).
MAC_VV_ASI="hudfix,glyphfix,keyboardgrid"

# ---- user-supplied source files (NEVER shipped; gitignored) ----
NOCD_EXE="${REVERT_ROOT}/game-modded-vanilla/THUG2.exe"
WSFIX_ZIP="${REVERT_ROOT}/tools/TonyHawksUnderground2.WidescreenFix.zip"
HQ_AUDIO_PACK="${REVERT_ROOT}/tools/THUG2_HQ_Xbox.7z"

# ---- HQ packs: community/derivative, NOT hosted here (fetch or bring-your-own) ----
# `revert acquire-hq [audio|textures|all]` downloads these to the paths the build
# already reads; then `revert build` applies them. Leave a URL empty to bring your
# own file (drop it at the path below). Set the matching _SHA256 to verify integrity.
HQ_AUDIO_URL=""                      # -> $HQ_AUDIO_PACK (.7z; pcm.* excluded on apply)
HQ_AUDIO_SHA256=""
HQ_TEXTURES_URL=""                   # -> extracted into $HQ_TEXTURES_BLOB
HQ_TEXTURES_SHA256=""
HQ_TEXTURES_BLOB="${MODS_DIR}/packs/hq-level-textures/blob"

# ---- build outputs / editions ----
EDITION_VANILLA="${REVERT_ROOT}/game-modded-vanilla"
EDITION_QOL="${REVERT_ROOT}/game-playable-us"

# ---- shippable build assets (in-repo) ----
# NOTE: during the Stage-1 transition these still live under tools/; they migrate to
# share/ in the stage that builds their new consumer. Update these two lines then.
HUDFIX_ASI="${REVERT_ROOT}/tools/hudfix/VV.HudFix.asi"
GLYPHFIX_ASI="${REVERT_ROOT}/tools/glyphfix/VV.GlyphFix.asi"
KEYBOARDGRID_ASI="${REVERT_ROOT}/tools/keyboardgrid/VV.KeyboardGrid.asi"
TAGS_DIR="${REVERT_ROOT}/tools/save/tags"
SOUNDTRACK_QB_ORIGINAL="${REVERT_ROOT}/tools/bink/radio/variants/skater_sfx_original.qb"
CONTROLS_DIR="${REVERT_ROOT}/tools/controls"
TRIGGER_BRIDGE="${REVERT_ROOT}/tools/trigger-bridge/thug2-trigger-bridge.py"
PAD_BRIDGE="${REVERT_ROOT}/tools/trigger-bridge/thug2-pad-mirror.py"  # Deck: stable virtual analog pad (mirrors Steam's pad) + combos
SET_SOUNDTRACK="${REVERT_ROOT}/tools/bink/radio/set_soundtrack.sh"
PAD_PROBE="${REVERT_ROOT}/tools/xinput-probe/dinput_probe_guid.exe"  # Deck pad-GUID detector (padfix hook)

# ---- input glyphs ----
# Button-prompt glyph style for trick combos (VV.GlyphFix.asi). One of:
#   auto (Steam Deck + Xbox-style pads -> xbox) | xbox | playstation | gamecube | keyboard
# Override per launch with `revert run <lane> --glyphs playstation`.
GLYPH_STYLE="auto"

# ---- lanes: LANE_<NAME>_{DIR,PREFIX,EXE,ENV,HOOKS,SOUNDTRACK} ----
LANE_VANILLA_DIR="${EDITION_VANILLA}"
LANE_VANILLA_PREFIX="${PREFIX_MAIN}"
LANE_VANILLA_EXE="THUG2.exe"
LANE_VANILLA_HOOKS="padfix,trigger-bridge"

LANE_QOL_DIR="${EDITION_QOL}"
LANE_QOL_PREFIX="${PREFIX_MAIN}"
LANE_QOL_EXE="THUG2.exe"
LANE_QOL_HOOKS="soundtrack,padfix,trigger-bridge"
LANE_QOL_SOUNDTRACK="original"               # default; override with `revert run qol --soundtrack radio`

LANE_ONLINE_DIR="${PREFIX_ONLINE}/drive_c/users/${USER}/AppData/Local/THUG Pro"
LANE_ONLINE_PREFIX="${PREFIX_ONLINE}"
LANE_ONLINE_EXE="THUGProLauncher.exe"
LANE_ONLINE_ENV="WINEDLLOVERRIDES=mscoree=b"
LANE_ONLINE_HOOKS=""

# ---- online lane: THUG Pro installer (community app, not shipped) ----
# `revert setup --online` fetches THUG Pro's official installer and launches it (it then
# asks for your clean THUG2 folder and downloads the full build itself). Override the URL
# in revert.conf.local, or drop your own THUGProSetup.exe at THUGPRO_SETUP to skip the
# download (bring-your-own; presence wins over the URL).
THUGPRO_SETUP_URL="http://dl.thugpro.com/THUGProSetup.exe"
THUGPRO_SETUP="${REVERT_ROOT}/tools/thugpro/THUGProSetup.exe"

# ---- optional dev-only packs (presence-gated; gitignored; never shipped) ----
DECKS_BLOB="${MODS_DIR}/src/decks-pack/blob/textures"
PLAYAS_BLOB="${MODS_DIR}/src/playas-pro/blob/models"
RADIO_BIK="${REVERT_ROOT}/tools/bink/radio/bik"

# ---- local overrides (gitignored; survives `revert update`) ----
# Put machine-specific config + URLs here (HQ_AUDIO_URL, GE_DIR, GLYPH_STYLE, GPU_FILTER, ...);
# it's sourced last, so it wins over the defaults above and never conflicts on update.
# NB: use `if/fi` (not `&&`) — a false `&&` returns non-zero and would trip `set -e`.
if [[ -f "${REVERT_ROOT}/revert.conf.local" ]]; then
  # shellcheck disable=SC1090
  source "${REVERT_ROOT}/revert.conf.local"
fi
